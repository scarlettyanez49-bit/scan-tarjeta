<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scanner</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: linear-gradient(#f8e6ea, #f3d6dc);
}

h1 { color: #a05a6c; }

#reader {
    width: 300px;
    margin: auto;
}
</style>
</head>

<body>

<h1>Escanear QR</h1>
<div id="reader"></div>

<script>

const html5QrCode = new Html5Qrcode("reader");

html5QrCode.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },

    (decodedText) => {

        html5QrCode.stop();

        try {
            let url = new URL(decodedText);

            let puntos = parseInt(url.searchParams.get("puntos")) || 0;
            let max = parseInt(url.searchParams.get("max")) || 10;

            puntos++;

            if (puntos > max) puntos = max;

            // regresar a tarjeta
            window.location.href = "index.html?puntos=" + puntos;

        } catch {
            alert("QR inválido");
        }
    }
);

</script>

</body>
</html>
